<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Marketplace</a>
        <div class="d-flex">
            {% if user.is_authenticated %}
                <span class="text-white me-3">Hola {{ user.username }}</span>
                <a href="{% url 'cart_detail' %}" class="btn btn-outline-light btn-sm me-2">Carrito</a>
                {% if user.is_seller %}
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-info btn-sm me-2">Dashboard</a>
                {% endif %}
                <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">Login</a>
                <a href="{% url 'register' %}" class="btn btn-primary btn-sm">Registro</a>
            {% endif %}
        </div>
    </div>
</nav>
<div class="container mt-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
